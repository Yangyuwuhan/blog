mainSections = ["post"]
rssFullContent = true
favicon = "img/avatar.png"

[footer]
since = 2026

[dateFormat]
published = "2006-01-02 Mon"
lastUpdated = "2006-01-02 Mon"

[sidebar]
emoji = ""
subtitle = "Lorem ipsum dolor sit amet, consectetur adipiscing elit."
avatar = "img/avatar.png"

[article]
[article.license]
enabled = false
default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"
[article.alertIcon]
# Alert icons for different alert types (note, tip, important, warning, caution)
note = "📝"
tip = "💡"
important = "📌"
warning = "⚠️"
caution = "🚨"

[widgets]
homepage = [
    { type = "search" },
    { type = "archives", params = { limit = 5 } },
    { type = "categories", params = { limit = 10 } },
]
page = [{ type = "toc" }]

[comments]
# See complete configuration in config/_default/params.toml
enabled = true
provider = "utterances"
[comments.utterances]
repo = "Yangyuwuhan/blog"
issueTerm = "pathname"
label = "💬"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
enabled = false

[cookies.categories]
analytics = true
functional = true
[colorScheme]
    toggle = true
    default = "dark"
